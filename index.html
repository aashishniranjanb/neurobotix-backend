<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XION 2026 — TriSync Digital Twin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0a0a;
        font-family: 'Space Mono', monospace;
      }

      /* ── TriSync Reveal Animation ────────────────── */
      .trisync-reveal-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        pointer-events: none;
        animation: revealFlash 2.5s ease-out forwards;
      }

      .trisync-reveal-text {
        color: #c9a84c;
        font-family: 'Space Mono', monospace;
        font-size: 3rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        border: 1px solid #c9a84c;
        padding: 16px 48px;
        animation: triSyncReveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
        opacity: 0;
      }

      @keyframes revealFlash {
        0%   { background: rgba(201, 168, 76, 0.3); }
        15%  { background: rgba(201, 168, 76, 0.05); }
        100% { background: transparent; }
      }

      @keyframes triSyncReveal {
        0%   { opacity: 0; letter-spacing: 2em; transform: scaleX(0); }
        60%  { opacity: 1; transform: scaleX(1.05); }
        100% { opacity: 1; letter-spacing: 0.3em; transform: scaleX(1); }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.jsx"></script>
  </body>
</html>
